<div style="padding:12px 0 0">
<div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap">
  <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:#BA7517;display:inline-block;border-radius:2px"></span>Internal resolution score</span>
  <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:#185FA5;display:inline-block;border-radius:2px"></span>Actual routing quality</span>
  <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:12px;background:rgba(211,81,48,0.12);display:inline-block;border-radius:2px;border:0.5px solid rgba(211,81,48,0.3)"></span>Feedback poisoning zone</span>
</div>
<div style="position:relative;width:100%;height:280px">
  <canvas id="decouplingChart"></canvas>
</div>
<p style="font-size:11px;color:var(--color-text-tertiary);margin:8px 0 0;text-align:center">Fig. 4 — Proxy-quality decoupling over 22 iterations (Six Atomic scenario, illustrative) · Y-axis starts at zero</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = Array.from({length:23}, (_,i) => i === 0 ? '0' : i === 7 ? '7\n(week 1)' : i === 14 ? '14\n(week 2)' : i === 22 ? '22\n(week 3)' : String(i));
const scoreData = [78,79,81,82,83,84,85,87,88,89,89,90,90,91,91,91,92,92,93,93,93,94,94];
const qualityData = [78,79,80,81,82,84,84,83,82,80,79,77,75,73,71,68,66,64,62,60,58,57,55];

const poisonPlugin = {
  id:'poison',
  beforeDraw(chart) {
    const {ctx, chartArea:{left,right,top,bottom}, scales:{x,y}} = chart;
    const x7 = x.getPixelForValue(7);
    const x22 = x.getPixelForValue(22);
    ctx.save();
    ctx.fillStyle = 'rgba(211,81,48,0.10)';
    ctx.fillRect(x7, top, x22-x7, bottom-top);
    ctx.strokeStyle = 'rgba(186,117,23,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(x7, top); ctx.lineTo(x7, bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(186,117,23,0.8)';
    ctx.font = '10px sans-serif';
    ctx.fillText('Proxy-quality correlation weakens', x7+4, top+14);
    ctx.restore();
  }
};

new Chart(document.getElementById('decouplingChart'), {
  type: 'line',
  plugins: [poisonPlugin],
  data: {
    labels,
    datasets: [
      {
        label: 'Internal resolution score',
        data: scoreData,
        borderColor: '#BA7517',
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3
      },
      {
        label: 'Actual routing quality',
        data: qualityData,
        borderColor: '#185FA5',
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3,
        borderDash: [4,2]
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
    scales: {
      x: {
        title: { display: true, text: 'Iteration (day)', font: { size: 11 }, color: '#73726c' },
        ticks: { font: { size: 10 }, color: '#888780', maxRotation: 0, autoSkip: false,
          callback: (v, i) => [0,7,14,22].includes(i) ? i : '' }
      },
      y: {
        min: 0, max: 100,
        title: { display: true, text: 'Performance score (%)', font: { size: 11 }, color: '#73726c' },
        ticks: { font: { size: 10 }, color: '#888780', callback: v => v + '%' }
      }
    }
  }
});
</script>
